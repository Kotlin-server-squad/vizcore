spring.application.name=spring-vizcore-demo
# Plain app — no web server.
spring.main.web-application-type=none
spring.main.banner-mode=off
# vizcore connection (override via env: VIZCORE_BACKEND_URL, VIZCORE_TOKEN, VIZCORE_APP_NAME)
vizcore.app-name=${VIZCORE_APP_NAME:spring-vizcore-demo}
vizcore.backend-url=${VIZCORE_BACKEND_URL:http://localhost:8080}
vizcore.token=${VIZCORE_TOKEN:demo-token}
logging.level.root=WARN
logging.level.com.jh.vizcore.demo=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{0} - %msg%n
