ktor:
  application:
    modules:
      - com.jh.proj.coroutineviz.ApplicationKt.module
  deployment:
    port: ${PORT:8080}

auth:
  apiKey: ${API_KEY:}  # Empty = auth disabled

cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS:"http://localhost:3000,http://127.0.0.1:3000"}
  allowedMethods: ${CORS_ALLOWED_METHODS:"GET,POST,DELETE,OPTIONS"}

session:
  maxEvents: ${SESSION_MAX_EVENTS:10000}

storage:
  type: ${STORAGE_TYPE:memory}  # memory | database. Default memory = in-memory, ephemeral (D-04a)
  database:
    url: ${DB_URL:"jdbc:h2:file:./data/coroutineviz;AUTO_SERVER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE"}
    driver: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  retention:
    maxAgeDays: ${RETENTION_MAX_AGE_DAYS:30}
    maxEventsPerSession: ${RETENTION_MAX_EVENTS_PER_SESSION:100000}
    cleanupIntervalMinutes: ${RETENTION_CLEANUP_INTERVAL_MINUTES:60}
